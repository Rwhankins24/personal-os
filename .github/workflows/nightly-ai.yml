name: Nightly AI Intelligence Job

on:
  schedule:
    # 9:00am-18:00 UTC = 2:00am-11:00am Phoenix
    # Polls every 10 minutes in this window, weekdays only
    # Monday run catches Friday's emails
    # Only fires when pipeline processing is done
    - cron: '*/10 9-18 * * 1-5'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run even if already completed today'
        required: false
        default: 'false'
      date_override:
        description: 'Backfill: run AI for this date (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''
      force_rerun:
        description: 'Re-run AI even if already completed for that date'
        required: false
        default: 'false'

jobs:
  check-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check pipeline and trigger AI
        id: check
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          FORCE="${{ github.event.inputs.force_run }}"
          echo "Checking pipeline for $TODAY (force=$FORCE)"

          # Force flag bypasses ALL pipeline checks — run immediately
          if [ "$FORCE" = "true" ]; then
            echo "Force run requested — bypassing pipeline status checks"
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          STATUS=$(curl -s \
            "${{ secrets.API_URL }}/api/pipeline/status" \
            -H "x-trigger-secret: ${{ secrets.TRIGGER_SECRET }}")

          echo "Status: $STATUS"

          PROCESSING_DONE=$(echo "$STATUS" | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print(d.get('processing_completed_at') or '')" \
            2>/dev/null)

          PLAUD_DONE=$(echo "$STATUS" | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print(d.get('plaud_pull_completed_at') or '')" \
            2>/dev/null)

          AI_DONE=$(echo "$STATUS" | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print(d.get('ai_completed_at') or '')" \
            2>/dev/null)

          # Calculate minutes since email processing completed
          MINUTES_SINCE_EMAIL=0
          if [ -n "$PROCESSING_DONE" ]; then
            PROC_EPOCH=$(python3 -c "
          from datetime import datetime, timezone
          import time
          dt = datetime.fromisoformat('${PROCESSING_DONE}'.replace('Z', '+00:00'))
          print(int(time.time() - dt.timestamp()))" 2>/dev/null || echo "0")
            MINUTES_SINCE_EMAIL=$((PROC_EPOCH / 60))
          fi

          echo "Email done: $PROCESSING_DONE"
          echo "Plaud done: $PLAUD_DONE"
          echo "AI done: $AI_DONE"
          echo "Minutes since email: $MINUTES_SINCE_EMAIL"

          # Fire when: email done AND (plaud done OR 90+ min since email) AND AI not done yet
          # The 90-min fallback ensures AI runs even if plaud-pull fails or has no meetings
          PLAUD_READY=false
          if [ -n "$PLAUD_DONE" ]; then
            PLAUD_READY=true
            echo "Plaud processing complete."
          elif [ "$MINUTES_SINCE_EMAIL" -ge 90 ]; then
            PLAUD_READY=true
            echo "Plaud not done but 90+ min since email — proceeding without waiting."
          else
            echo "Waiting for Plaud (${MINUTES_SINCE_EMAIL}m since email, need 90m fallback or plaud completion)."
          fi

          if [ -n "$PROCESSING_DONE" ] && [ "$PLAUD_READY" = "true" ] && [ -z "$AI_DONE" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "All prerequisites met. Running AI job."
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            if [ -z "$PROCESSING_DONE" ]; then
              echo "Email not processed yet. Skipping."
            elif [ -n "$AI_DONE" ]; then
              echo "AI already ran today. Skipping."
            fi
          fi

      - name: Checkout repository
        if: steps.check.outputs.should_run == 'true'
        uses: actions/checkout@v5

      - name: Setup Node.js
        if: steps.check.outputs.should_run == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        if: steps.check.outputs.should_run == 'true'
        run: |
          cd api
          npm ci

      - name: Run nightly AI job
        if: steps.check.outputs.should_run == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRIGGER_SECRET: ${{ secrets.TRIGGER_SECRET }}
          DATE_OVERRIDE: ${{ github.event.inputs.date_override }}
          FORCE_RERUN: ${{ github.event.inputs.force_rerun }}
        run: |
          cd api
          node src/jobs/nightly-ai-local.js
          echo "Exit code: $?"

      - name: Run nightly cleanup
        if: steps.check.outputs.should_run == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd api
          node scripts/cleanup-local.js
          echo "Cleanup exit: $?"

      - name: Notify on failure
        if: failure() && steps.check.outputs.should_run == 'true'
        run: |
          echo "AI job failed — sending notification"
          curl -s -X POST \
            "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "personalos@resend.dev",
              "to": "hankinsr@claycorp.com",
              "subject": "Personal OS — AI job FAILED (hard crash)",
              "text": "The nightly AI job crashed. Check GitHub Actions logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' || echo "Notification failed too"

      - name: Check for partial failures
        if: success() && steps.check.outputs.should_run == 'true'
        run: |
          # Job exited 0 but individual steps may have soft-errored.
          # Query pipeline_runs error_count — if > 0, send a softer warning.
          STATUS=$(curl -s \
            "${{ secrets.API_URL }}/api/pipeline/status" \
            -H "x-trigger-secret: ${{ secrets.TRIGGER_SECRET }}")
          ERROR_COUNT=$(echo "$STATUS" | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print(d.get('error_count') or 0)" 2>/dev/null || echo "0")
          echo "Pipeline error_count: $ERROR_COUNT"
          if [ "$ERROR_COUNT" -gt 0 ]; then
            echo "Partial failures detected — sending alert"
            curl -s -X POST \
              "https://api.resend.com/emails" \
              -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d "{
                \"from\": \"personalos@resend.dev\",
                \"to\": \"hankinsr@claycorp.com\",
                \"subject\": \"Personal OS — AI job partial failures (${ERROR_COUNT} errors)\",
                \"text\": \"The nightly AI job completed but had ${ERROR_COUNT} step-level errors. Some intelligence may be missing. Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
              }" || echo "Partial-failure notification failed"
          else
            echo "No partial failures — clean run."
          fi
