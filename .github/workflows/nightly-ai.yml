name: Nightly AI Intelligence Job

on:
  schedule:
    # 9:00am-18:00 UTC = 2:00am-11:00am Phoenix
    # Polls every 10 minutes in this window
    # Only fires when pipeline processing is done
    - cron: '*/10 9-18 * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run even if already completed today'
        required: false
        default: 'false'
      date_override:
        description: 'Backfill: run AI for this date (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''
      force_rerun:
        description: 'Re-run AI even if already completed for that date'
        required: false
        default: 'false'

jobs:
  check-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check pipeline and trigger AI
        id: check
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          FORCE="${{ github.event.inputs.force_run }}"
          echo "Checking pipeline for $TODAY (force=$FORCE)"

          # Force flag bypasses ALL pipeline checks — run immediately
          if [ "$FORCE" = "true" ]; then
            echo "Force run requested — bypassing pipeline status checks"
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          STATUS=$(curl -s \
            "${{ secrets.API_URL }}/api/pipeline/status" \
            -H "x-trigger-secret: ${{ secrets.TRIGGER_SECRET }}")

          echo "Status: $STATUS"

          PROCESSING_DONE=$(echo "$STATUS" | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print(d.get('processing_completed_at') or '')" \
            2>/dev/null)

          AI_DONE=$(echo "$STATUS" | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print(d.get('ai_completed_at') or '')" \
            2>/dev/null)

          # Calculate minutes since email processing
          MINUTES_SINCE=0
          if [ -n "$PROCESSING_DONE" ]; then
            PROC_EPOCH=$(python3 -c "
          from datetime import datetime, timezone
          import time
          dt = datetime.fromisoformat('${PROCESSING_DONE}'.replace('Z', '+00:00'))
          print(int(time.time() - dt.timestamp()))" 2>/dev/null || echo "0")
            MINUTES_SINCE=$((PROC_EPOCH / 60))
          fi

          echo "Email done: $PROCESSING_DONE"
          echo "Otter done: $OTTER_DONE"
          echo "Plaud done: $PLAUD_DONE"
          echo "AI done: $AI_DONE"
          echo "Minutes since email: $MINUTES_SINCE"

          # Fire when: email processing complete AND AI not done yet
          # Otter removed — fully migrated to Plaud (loaded from Supabase storage internally)
          # Run immediately when email is done, no meeting-source wait needed
          if [ -n "$PROCESSING_DONE" ] && [ -z "$AI_DONE" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Email done. Running AI job."
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            if [ -z "$PROCESSING_DONE" ]; then
              echo "Email not processed yet. Skipping."
            else
              echo "AI already ran today. Skipping."
            fi
          fi

      - name: Checkout repository
        if: steps.check.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.check.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        if: steps.check.outputs.should_run == 'true'
        run: |
          cd api
          npm ci

      - name: Run nightly AI job
        if: steps.check.outputs.should_run == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRIGGER_SECRET: ${{ secrets.TRIGGER_SECRET }}
          DATE_OVERRIDE: ${{ github.event.inputs.date_override }}
          FORCE_RERUN: ${{ github.event.inputs.force_rerun }}
        run: |
          cd api
          node src/jobs/nightly-ai-local.js
          echo "Exit code: $?"

      - name: Notify on failure
        if: failure() && steps.check.outputs.should_run == 'true'
        run: |
          echo "AI job failed — sending notification"
          curl -s -X POST \
            "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "personalos@resend.dev",
              "to": "ryanhankins.personalos@gmail.com",
              "subject": "Personal OS — AI job failed",
              "text": "The nightly AI job failed. Check GitHub Actions logs."
            }' || echo "Notification failed too"
