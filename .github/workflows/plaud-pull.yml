name: Plaud Meeting Pull

on:
  schedule:
    # 9:00 UTC = 2:00 AM Phoenix — runs before nightly AI starts polling (9:00 UTC+)
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      date_override:
        description: 'Pull emails for this date (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''

jobs:
  plaud-pull:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Pull Plaud emails from Gmail and upload to Supabase
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TRIGGER_SECRET: ${{ secrets.TRIGGER_SECRET }}
          API_URL: ${{ secrets.API_URL }}
          DATE_OVERRIDE: ${{ github.event.inputs.date_override }}
        run: |
          python3 - << 'PYEOF'
          import json, base64, re, os, sys, time
          import urllib.request, urllib.error
          from datetime import datetime, timezone

          TODAY = os.environ.get('DATE_OVERRIDE') or datetime.now(timezone.utc).strftime('%Y-%m-%d')
          NOW_UTC = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')

          CLIENT_ID     = os.environ['GMAIL_CLIENT_ID']
          CLIENT_SECRET = os.environ['GMAIL_CLIENT_SECRET']
          REFRESH_TOKEN = os.environ['GMAIL_REFRESH_TOKEN']
          SUPABASE_URL  = os.environ['SUPABASE_URL'].rstrip('/')
          SUPABASE_KEY  = os.environ['SUPABASE_SERVICE_KEY']
          TRIGGER_SECRET = os.environ.get('TRIGGER_SECRET', '')
          API_URL       = os.environ.get('API_URL', '').rstrip('/')

          def log(msg):
              print(f"[{datetime.now(timezone.utc).strftime('%H:%M:%S')}] {msg}", flush=True)

          # ── Refresh Gmail token ──────────────────────────────────────
          def refresh_token(attempt=1):
              data = urllib.parse.urlencode({
                  'client_id': CLIENT_ID,
                  'client_secret': CLIENT_SECRET,
                  'refresh_token': REFRESH_TOKEN,
                  'grant_type': 'refresh_token'
              }).encode()
              req = urllib.request.Request(
                  'https://oauth2.googleapis.com/token',
                  data=data,
                  headers={'Content-Type': 'application/x-www-form-urlencoded'}
              )
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      return json.loads(r.read()).get('access_token', '')
              except Exception as e:
                  log(f"Token refresh attempt {attempt} failed: {e}")
                  return ''

          import urllib.parse

          # ── Calculate lookback window ────────────────────────────────
          # Use max(days since last run, 2) so gaps from travel are caught
          def get_lookback_days():
              try:
                  req = urllib.request.Request(
                      f"{SUPABASE_URL}/rest/v1/pipeline_runs"
                      "?select=plaud_pull_completed_at&order=run_date.desc&limit=1",
                      headers={
                          'apikey': SUPABASE_KEY,
                          'Authorization': f'Bearer {SUPABASE_KEY}'
                      }
                  )
                  with urllib.request.urlopen(req, timeout=10) as r:
                      rows = json.loads(r.read())
                  if rows and rows[0].get('plaud_pull_completed_at'):
                      last_run = datetime.fromisoformat(
                          rows[0]['plaud_pull_completed_at'].replace('Z', '+00:00')
                      )
                      days_since = (datetime.now(timezone.utc) - last_run).days
                      lookback = max(days_since + 1, 2)  # at least 2, cover partial days
                      log(f"Last Plaud pull: {last_run.date()} ({days_since}d ago) → lookback {lookback}d")
                      return lookback
              except Exception as e:
                  log(f"Could not fetch last run date ({e}) — defaulting to 2d")
              return 2

          LOOKBACK_DAYS = get_lookback_days()

          # Backfill fix: if date_override is a historical date, extend lookback
          # so the Gmail newer_than:{N}d search covers that date.
          # Example: date_override=2026-06-21 with today=2026-06-29 → need lookback ≥ 9d
          DATE_OVERRIDE_STR = os.environ.get('DATE_OVERRIDE', '').strip()
          if DATE_OVERRIDE_STR:
              try:
                  override_dt = datetime.strptime(DATE_OVERRIDE_STR, '%Y-%m-%d').replace(tzinfo=timezone.utc)
                  days_back = (datetime.now(timezone.utc) - override_dt).days + 2  # +2 for partial-day safety
                  if days_back > LOOKBACK_DAYS:
                      log(f"date_override={DATE_OVERRIDE_STR} → extending lookback from {LOOKBACK_DAYS}d to {days_back}d")
                      LOOKBACK_DAYS = days_back
              except Exception as e:
                  log(f"date_override parse failed ({e}) — using computed lookback {LOOKBACK_DAYS}d")

          log("Refreshing Gmail access token...")
          ACCESS_TOKEN = refresh_token(1)
          if not ACCESS_TOKEN:
              time.sleep(10)
              ACCESS_TOKEN = refresh_token(2)
          if not ACCESS_TOKEN:
              log("FATAL: token refresh failed after 2 attempts")
              sys.exit(1)
          log("Token refresh: SUCCESS")

          # ── Gmail helpers ────────────────────────────────────────────
          def gmail_get(url):
              req = urllib.request.Request(url, headers={"Authorization": f"Bearer {ACCESS_TOKEN}"})
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      return json.loads(r.read())
              except Exception as e:
                  log(f"Gmail GET error: {e}")
                  return {}

          def decode_b64(data):
              if not data: return ""
              pad = 4 - len(data) % 4
              if pad != 4: data += "=" * pad
              return base64.urlsafe_b64decode(data).decode("utf-8", errors="replace")

          def find_attachments(payload):
              attachments = {}
              def walk(p):
                  fname = p.get("filename", "")
                  att_id = p.get("body", {}).get("attachmentId", "")
                  if fname and att_id:
                      attachments[fname.lower()] = att_id
                  for part in p.get("parts", []):
                      walk(part)
              walk(payload)
              return attachments

          def parse_action_items(body_text):
              ryan_items, others_items, unattributed = [], [], []
              lines = body_text.split('\n')
              in_action_section = False
              current_assignee = None

              for line in lines:
                  line = line.strip()
                  if not line:
                      continue
                  if re.search(r'action items?|follow.?ups?|next steps?|tasks?', line, re.I) and len(line) < 60:
                      in_action_section = True
                      current_assignee = None
                      continue
                  if re.match(r'^#{1,3}\s', line) and in_action_section:
                      in_action_section = False
                      current_assignee = None
                      continue
                  if not in_action_section:
                      continue

                  # **@Name** assignee header
                  plaud_assignee = re.match(r'^\*{0,2}@([^*\n]+?)\*{0,2}\s*$', line)
                  if plaud_assignee:
                      current_assignee = plaud_assignee.group(1).strip()
                      continue

                  line = re.sub(r'!\[.*?\]\(.*?\)', '', line).strip()
                  if not line:
                      continue

                  due_date = None
                  due_match = re.search(r'\[(Tomorrow|Today|TBD|[\w\s,]+\d{4})\]\s*$', line, re.I)
                  if due_match:
                      raw_due = due_match.group(1).strip()
                      if raw_due.lower() == 'tomorrow':
                          from datetime import timedelta
                          due_date = (datetime.now() + timedelta(days=1)).strftime('%Y-%m-%d')
                      elif raw_due.lower() not in ('tbd',):
                          due_date = raw_due
                      line = line[:due_match.start()].strip()

                  task = re.sub(r'^[-•\d\.]+\s*', '', line).strip()
                  task = re.sub(r'^\[[ xX]\]\s*', '', task).strip()
                  task = re.sub(r'\*{1,2}$', '', task).strip()
                  task = task.strip(' -–')
                  if not task or len(task) < 5:
                      continue

                  if current_assignee:
                      assignee = current_assignee
                      task_text = task
                  else:
                      speaker_match = re.match(r'^([A-Z][a-z]+(?:\s[A-Z][a-z]+)?)\s*:\s*(.+)', task)
                      if speaker_match:
                          assignee = speaker_match.group(1).strip()
                          task_text = speaker_match.group(2).strip()
                      else:
                          assignee = None
                          task_text = task

                  item = {"task": task_text, "assignee": assignee, "due_date": due_date, "source": "plaud_summary_txt"}
                  if assignee:
                      if re.search(r'\bryan\b', assignee, re.I):
                          ryan_items.append(item)
                      else:
                          others_items.append(item)
                  else:
                      unattributed.append(item)

              return ryan_items, others_items, unattributed

          def parse_summary(body_text):
              body_text = re.sub(r'!\[.*?\]\(.*?\)', '', body_text)
              body_text = re.sub(r'\[([^\]]+)\]\([^\)]+\)', r'\1', body_text)
              lines = body_text.split('\n')
              summary_lines = []
              in_summary = False
              for line in lines:
                  stripped = line.strip()
                  if not stripped:
                      continue
                  if re.search(r'summary|overview|meeting notes?', stripped, re.I) and len(stripped) < 60:
                      in_summary = True
                      continue
                  if re.search(r'action items?|follow.?ups?|next steps?', stripped, re.I) and len(stripped) < 60:
                      break
                  if in_summary or (not summary_lines and len(stripped) > 20):
                      if not in_summary:
                          in_summary = True
                      summary_lines.append(stripped)
                      if len(summary_lines) >= 8:
                          break
              return ' '.join(summary_lines) if summary_lines else body_text[:500]

          # ── Search Gmail ─────────────────────────────────────────────
          log(f"Searching Gmail for [Plaud-AutoFlow] emails (last {LOOKBACK_DAYS}d)...")
          search = gmail_get(
              "https://gmail.googleapis.com/gmail/v1/users/me/messages"
              f"?q=subject%3A%5BPlaud-AutoFlow%5D+newer_than%3A{LOOKBACK_DAYS}d&maxResults=50"
          )
          message_ids = [m['id'] for m in search.get('messages', [])]
          log(f"Found {len(message_ids)} Plaud messages")

          if not message_ids:
              report = {
                  "report_date": TODAY, "source": "plaud", "generated_at": NOW_UTC,
                  "meetings": [], "meeting_ids_seen": [],
                  "ryan_action_items_total": 0, "others_action_items_total": 0,
                  "meetings_with_transcripts": 0, "warnings": ["No Plaud emails found in last 48h"]
              }
          else:
              meetings, warnings, ryan_total, others_total, transcripts_count, seen_ids = [], [], 0, 0, 0, []

              for msg_id in message_ids:
                  url = f"https://gmail.googleapis.com/gmail/v1/users/me/messages/{msg_id}?format=full"
                  msg = gmail_get(url)
                  if not msg:
                      warnings.append(f"Failed to fetch message {msg_id}")
                      continue

                  headers = {h['name']: h['value'] for h in msg.get('payload', {}).get('headers', [])}
                  subject = headers.get('Subject', '')
                  title = re.sub(r'^\[Plaud-AutoFlow\]\s*', '', subject).strip()
                  date_match = re.match(r'^(\d{2})-(\d{2})\s+(.*)', title)
                  if date_match:
                      month, day, title = date_match.group(1), date_match.group(2), date_match.group(3)
                      meeting_date = f"{TODAY[:4]}-{month}-{day}"
                  else:
                      meeting_date = TODAY

                  attachments = find_attachments(msg.get('payload', {}))

                  summary_text = ""
                  summary_att_id = attachments.get("summary.txt")
                  if summary_att_id:
                      att = gmail_get(f"https://gmail.googleapis.com/gmail/v1/users/me/messages/{msg_id}/attachments/{summary_att_id}")
                      summary_text = decode_b64(att.get('data', ''))
                  else:
                      warnings.append(f"No summary.txt for: {title}")

                  summary = parse_summary(summary_text) if summary_text else ""
                  ryan_items, others_items, unattributed = parse_action_items(summary_text) if summary_text else ([], [], [])

                  transcript_text = None
                  has_transcript = False
                  transcript_att_id = (
                      attachments.get("transcript.txt") or
                      next((v for k, v in attachments.items() if "transcript" in k), None)
                  )
                  if transcript_att_id:
                      att = gmail_get(f"https://gmail.googleapis.com/gmail/v1/users/me/messages/{msg_id}/attachments/{transcript_att_id}")
                      raw = att.get('data', '')
                      if raw:
                          transcript_text = decode_b64(raw)
                          has_transcript = True
                          transcripts_count += 1
                      else:
                          warnings.append(f"Transcript empty for: {title}")
                  else:
                      warnings.append(f"No transcript for: {title}")

                  ryan_total += len(ryan_items)
                  others_total += len(others_items)
                  seen_ids.append(msg_id)

                  meetings.append({
                      "id": msg_id, "gmail_message_id": msg_id,
                      "title": title, "date": meeting_date, "source": "plaud",
                      "email_subject": subject, "summary": summary,
                      "email_body_raw": summary_text, "participants": [],
                      "ryan_action_items": ryan_items,
                      "others_action_items": others_items,
                      "unattributed_action_items": unattributed,
                      "has_transcript": has_transcript,
                      "transcript_text": transcript_text,
                      "transcript_word_count": len(transcript_text.split()) if transcript_text else 0
                  })
                  log(f"  Processed: {title} — {len(ryan_items)} Ryan, {len(others_items)} others")

              report = {
                  "report_date": TODAY, "source": "plaud", "generated_at": NOW_UTC,
                  "meetings": meetings, "meeting_ids_seen": seen_ids,
                  "ryan_action_items_total": ryan_total,
                  "others_action_items_total": others_total,
                  "meetings_with_transcripts": transcripts_count,
                  "warnings": warnings
              }

          # ── Upload to Supabase storage ───────────────────────────────
          log(f"Uploading plaud-{TODAY}.json to Supabase storage...")
          report_bytes = json.dumps(report, indent=2).encode('utf-8')
          upload_url = f"{SUPABASE_URL}/storage/v1/object/daily-reports/plaud-{TODAY}.json"

          # Try upsert first, fall back to insert
          for method in ['PUT', 'POST']:
              req = urllib.request.Request(
                  upload_url,
                  data=report_bytes,
                  method=method,
                  headers={
                      'Authorization': f'Bearer {SUPABASE_KEY}',
                      'Content-Type': 'application/json',
                      'x-upsert': 'true'
                  }
              )
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      log(f"Upload SUCCESS ({method} {r.status}) — {len(report_bytes)} bytes")
                      break
              except urllib.error.HTTPError as e:
                  log(f"Upload {method} failed: {e.code} {e.reason}")
                  if method == 'POST':
                      log("FATAL: upload failed")
                      sys.exit(1)

          # ── Upsert meetings into meeting_notes table ─────────────────
          if API_URL and TRIGGER_SECRET and report.get('meetings'):
              log(f"Upserting {len(report['meetings'])} meetings into meeting_notes...")
              upserted = 0
              for m in report['meetings']:
                  try:
                      note_payload = json.dumps({
                          "title":        m.get("title", "Untitled"),
                          "meeting_date": m.get("date"),
                          "source":       "plaud",
                          "summary":      m.get("summary") or m.get("email_body_raw", ""),
                          "action_items": (
                              m.get("ryan_action_items", []) +
                              m.get("others_action_items", []) +
                              m.get("unattributed_action_items", [])
                          ),
                          "participants":       m.get("participants", []),
                          "raw_transcript":     m.get("transcript_text", ""),
                          "external_id":        m.get("gmail_message_id") or m.get("id"),
                          "has_transcript":     m.get("has_transcript", False),
                          "transcript_word_count": m.get("transcript_word_count", 0),
                      }).encode()
                      upsert_req = urllib.request.Request(
                          f"{API_URL}/api/meeting-notes",
                          data=note_payload,
                          method='POST',
                          headers={
                              'Content-Type': 'application/json',
                              'x-trigger-secret': TRIGGER_SECRET
                          }
                      )
                      with urllib.request.urlopen(upsert_req, timeout=15) as r:
                          upserted += 1
                  except Exception as e:
                      log(f"  Meeting upsert failed ({m.get('title', '?')}): {e}")
              log(f"  Upserted {upserted}/{len(report['meetings'])} meetings into meeting_notes")

          # ── Mark pipeline step complete ──────────────────────────────
          if API_URL and TRIGGER_SECRET:
              log("Marking plaud_processing complete in pipeline...")
              payload = json.dumps({"step": "plaud_processing"}).encode()
              req = urllib.request.Request(
                  f"{API_URL}/api/pipeline/complete-step",
                  data=payload,
                  method='POST',
                  headers={
                      'Content-Type': 'application/json',
                      'x-trigger-secret': TRIGGER_SECRET
                  }
              )
              try:
                  with urllib.request.urlopen(req, timeout=15) as r:
                      log(f"Pipeline step marked complete: {r.status}")
              except Exception as e:
                  log(f"Pipeline step update failed (non-fatal): {e}")

          log(f"DONE — {len(report.get('meetings', []))} meetings, {report.get('ryan_action_items_total', 0)} Ryan items, {report.get('others_action_items_total', 0)} others")
          PYEOF

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST \
            "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "personalos@resend.dev",
              "to": "ryanhankins.personalos@gmail.com",
              "subject": "Personal OS — Plaud pull failed",
              "text": "The nightly Plaud Gmail pull failed. Check GitHub Actions logs."
            }' || true
